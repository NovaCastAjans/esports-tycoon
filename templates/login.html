<!DOCTYPE html>
<html>
<head>
    <title>Giriş Yap</title>
    <style>
        body { background: #0b0e14; color: #e0e4ec; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: #141c2b; padding: 40px; border-radius: 20px; border: 1px solid #4a9eff; width: 100%; max-width: 400px; }
        .card h2 { color: #4a9eff; margin-bottom: 20px; }
        .card input { width: 100%; padding: 12px; margin: 8px 0; background: #0b0e14; border: 1px solid #2a3a55; border-radius: 8px; color: #fff; }
        .card button { width: 100%; padding: 12px; background: #4a9eff; border: none; border-radius: 8px; font-weight: bold; color: #fff; cursor: pointer; }
        .card button:hover { background: #3a7fcc; }
        .card a { color: #4a9eff; text-decoration: none; }
        .flash { padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .success { background: #1a3a2a; border: 1px solid #4ade80; }
        .danger { background: #3a1a1a; border: 1px solid #ef4444; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔐 Giriş Yap</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        <form method="post">
            <input type="text" name="username" placeholder="Kullanıcı Adı" required>
            <input type="password" name="password" placeholder="Şifre" required>
            <button type="submit">Giriş Yap</button>
        </form>
        <p style="margin-top: 15px; text-align: center;">Hesabın yok mu? <a href="{{ url_for('register') }}">Kayıt Ol</a></p>
    </div>
</body>
</html>
