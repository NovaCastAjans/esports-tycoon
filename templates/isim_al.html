<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esports Tycoon - Hoş Geldin</title>
    <style>
        body {
            background: #0b0e14;
            color: #e0e4ec;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #141c2b;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #4a9eff;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .card h2 {
            color: #4a9eff;
            margin-bottom: 10px;
        }
        .card p {
            color: #94a3b8;
            margin-bottom: 20px;
        }
        .card input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #0b0e14;
            border: 1px solid #2a3a55;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
        }
        .card button {
            width: 100%;
            padding: 12px;
            background: #4a9eff;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            font-size: 16px;
        }
        .card button:hover {
            background: #3a7fcc;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>🎮 Esports Tycoon</h2>
        <p>Oyuna başlamak için bir isim seç</p>
        <form method="post" action="/isim_kaydet">
            <input type="text" name="isim" placeholder="Kullanıcı Adın" required>
            <button type="submit">Başla</button>
        </form>
    </div>
</body>
</html>
